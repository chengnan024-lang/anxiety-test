<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>恋爱关系焦虑测评</title>
  <meta name="description" content="22题关系焦虑测评，约8-12分钟完成，帮助你识别依恋触发点并获得可执行建议。" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="恋爱关系焦虑测评" />
  <meta property="og:description" content="22题关系焦虑测评，约8-12分钟完成，帮助你识别依恋触发点并获得可执行建议。" />
  <meta property="og:image" content="./og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="恋爱关系焦虑测评" />
  <meta name="twitter:description" content="22题关系焦虑测评，约8-12分钟完成，帮助你识别依恋触发点并获得可执行建议。" />
  <meta name="twitter:image" content="./og-image.png" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#f7f8fa;margin:0;color:#222}
    .container{max-width:680px;margin:0 auto;padding:20px}
    .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 6px 24px rgba(0,0,0,.06)}
    h1{font-size:24px;margin:8px 0 10px}
    .sub{color:#666;font-size:14px;line-height:1.7}
    .btn{width:100%;border:none;border-radius:12px;padding:14px 16px;font-size:16px;font-weight:700;cursor:pointer;min-height:44px}
    .btn-primary{background:#111;color:#fff}
    .btn-ghost{background:#f2f3f5;color:#333}
    .mt{margin-top:12px}
    .question-section,.result,#fullreport{display:none}
    .progress{display:flex;align-items:center;gap:10px;font-size:13px;color:#666;margin-bottom:12px}
    .bar{flex:1;height:8px;background:#eceff3;border-radius:99px;overflow:hidden}
    .fill{height:100%;width:0;background:#111}
    #question{font-size:20px;line-height:1.6;margin:14px 0 18px}
    .option-btn{width:100%;text-align:left;border:1px solid #e5e7eb;background:#fff;padding:14px 14px;border-radius:10px;margin-bottom:10px;cursor:pointer}
    .option-btn:hover{border-color:#111}
    .badge{display:inline-block;background:#eef2ff;color:#374151;border-radius:999px;padding:5px 10px;font-size:12px}
    .score{font-size:42px;font-weight:800;margin:6px 0}
    .line{border-top:1px solid #eee;margin:14px 0}
    .small{font-size:13px;color:#666;line-height:1.8}
    .section-title{font-weight:700;margin:12px 0 8px}
    .chart-wrap{margin:10px 0 4px}
    .chart-row{margin:10px 0}
    .chart-head{display:flex;justify-content:space-between;font-size:13px;color:#444;margin-bottom:6px}
    .chart-track{height:10px;background:#eef1f5;border-radius:99px;overflow:hidden}
    .chart-fill{height:100%;width:0;border-radius:99px;transition:width .45s ease}
    .c1{background:linear-gradient(90deg,#FF8A8A,#FF6B6B)}
    .c2{background:linear-gradient(90deg,#FFCC80,#FFB74D)}
    .c3{background:linear-gradient(90deg,#80CBC4,#4DB6AC)}
    .c4{background:linear-gradient(90deg,#90CAF9,#64B5F6)}
    @media (max-width:640px){
      .container{padding:10px}
      .card{padding:16px}
      h1{font-size:22px}
      #question{font-size:18px}
      .btn,.option-btn{font-size:14px;min-height:44px}
      .option-btn{padding:12px 14px}
      .footer{font-size:12px;line-height:1.6;padding:16px 10px}
    }
    .footer{text-align:center;font-size:13px;color:#999;line-height:1.8;padding:20px 16px}
    .footer a{color:#666;text-decoration:underline}
  </style>
</head>
<body>
  <div class="container">

    <div class="card home">
      <span class="badge">关系测评</span>
      <h1>恋爱关系焦虑测评</h1>
      <p class="sub">测评约 8-12 分钟，仅用于自我觉察与关系优化。完成测评后即可查看完整报告。</p>
      <button class="btn btn-primary mt" onclick="start('deep')">开始测评</button>
      <div id="deep-indicator" class="small mt" style="display:none;">已进入完整版测评</div>
    </div>

    <div class="card question-section">
      <div class="progress">
        <span id="progress-text">1/22</span>
        <div class="bar"><div id="progress-bar" class="fill"></div></div>
      </div>
      <div id="question"></div>
      <div id="options"></div>
    </div>

    <div class="card result">
      <span class="badge">测评结果</span>
      <h2 id="typeName">-</h2>
      <div id="typeEmoji" style="font-size:28px;">🌿</div>
      <div class="score"><span id="scoreNum">0</span> 分</div>
      <p id="typeDesc" class="sub">-</p>

      <div class="line"></div>
      <div class="section-title">简版维度分析</div>
      <div id="mainAnalysis" class="small">-</div>
      <div class="chart-wrap" id="miniChart"></div>

      <div class="line"></div>
      <button id="payBtn" class="btn btn-primary" onclick="paySuccess()">查看完整报告</button>
      <button class="btn btn-ghost mt" onclick="restart()">再测一次</button>

      <div id="locked-section" class="locked-section" style="display:none;"></div>
    </div>

    <div id="paypage" style="display:none !important;"></div>

    <div class="card" id="fullreport" style="display:none;">
      <span class="badge">完整报告</span>
      <h2 id="typeName2">-</h2>
      <div class="score"><span id="scoreNum2">0</span> 分</div>

      <div class="section-title">四维画像</div>
      <div class="chart-wrap" id="fullChart"></div>

      <div class="section-title">核心表现</div>
      <div id="reasonAnalysis" class="small"></div>

      <div class="section-title">风险提醒</div>
      <div id="riskAnalysis" class="small"></div>

      <div class="section-title">调整建议</div>
      <div id="adviceAnalysis" class="small"></div>

      <div class="section-title">心理机制说明</div>
      <div id="psychoContent" class="small"></div>

      <button class="btn btn-ghost mt" onclick="restart()">返回首页</button>
    </div>
  </div>

  <div class="footer">
    <p>本测评仅供自我觉察，不替代专业心理咨询</p>
    <p>如需帮助请联系专业机构</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
